# ╔══════════════════════════════════════════════════════════════════════╗
# ║  serenity.conf - Configuración Central de Serenity BDD              ║
# ║                                                                      ║
# ║  ¿QUÉ ES ESTE ARCHIVO?                                               ║
# ║  Es el archivo de configuración principal de Serenity BDD.           ║
# ║  Usa formato HOCON (Human-Optimized Config Object Notation),         ║
# ║  que es una versión mejorada de JSON/properties.                     ║
# ║                                                                      ║
# ║  ¿POR QUÉ EXISTE?                                                    ║
# ║  - Centraliza TODA la configuración en un lugar                      ║
# ║  - Permite cambiar el navegador, URL o timeouts sin tocar el código  ║
# ║  - Define el comportamiento de screenshots, reportes y esperas       ║
# ║                                                                      ║
# ║  UBICACIÓN: src/test/resources/serenity.conf                         ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────
#  SECCIÓN: webdriver
#  Configura Selenium WebDriver (el motor que controla el navegador)
# ─────────────────────────────────────────────────────────────────────
webdriver {
    # Navegador a usar. Opciones: chrome, firefox, edge, safari
    # Para cambiar el navegador, solo cambia este valor.
    driver = chrome

    # ─────────────────────────────────────────────────────────────
    #  Opciones específicas de Chrome
    #  Estas opciones le dicen a Chrome cómo comportarse.
    # ─────────────────────────────────────────────────────────────
    chrome {
        switches = [
            # Ejecutar sin interfaz gráfica (ideal para CI/CD)
            # Comenta esta línea si quieres VER el navegador ejecutarse
            "--headless=new",

            # Evita errores de sandbox en entornos Linux/Docker
            "--no-sandbox",

            # Reduce el uso de memoria compartida en Docker
            "--disable-dev-shm-usage",

            # Deshabilita extensiones para pruebas más rápidas
            "--disable-extensions",

            # Deshabilita GPU (no necesaria en pruebas automatizadas)
            "--disable-gpu",

            # Ventana en tamaño estándar para consistencia entre máquinas
            "--window-size=1920,1080",

            # Deshabilita notificaciones (evitan interferir con pruebas)
            "--disable-notifications",

            # Deshabilita infobars de "Chrome está siendo controlado"
            "--disable-infobars"
        ]
    }
}

# ─────────────────────────────────────────────────────────────────────
#  SECCIÓN: serenity
#  Configuración del framework Serenity BDD
# ─────────────────────────────────────────────────────────────────────
serenity {
    # ─────────────────────────────────────────────────────────────
    #  Timeouts de espera (en milisegundos)
    #  IMPORTANTE: Serenity maneja esperas explícitas internamente.
    #  NO necesitas Thread.sleep() en el código.
    # ─────────────────────────────────────────────────────────────

    # Tiempo máximo esperando que un elemento aparezca en pantalla
    # 10 segundos es un buen balance entre velocidad y confiabilidad
    timeout = 15000

    # Tiempo máximo para que una página cargue completamente
    page.load.timeout = 30000

    # Intervalo entre cada intento de buscar un elemento
    # 500ms = Serenity intentará encontrar el elemento cada 0.5 segundos
    polling.interval = 500

    # ─────────────────────────────────────────────────────────────
    #  Configuración de Screenshots
    #  Serenity toma capturas de pantalla automáticamente.
    #  Esto es INVALUABLE para entender qué falló en una prueba.
    # ─────────────────────────────────────────────────────────────

    # Cuándo tomar screenshots:
    # FOR_EACH_ACTION = en cada acción (mucha información, archivos grandes)
    # BEFORE_AND_AFTER_EACH_STEP = antes y después de cada Step de Gherkin
    # AFTER_EACH_STEP = solo después de cada step (más liviano)
    # FOR_FAILURES = solo cuando falla (mínimo, para CI/CD rápido)
    headless.mode = true   
    take.screenshots = FOR_FAILURES
    
    # ─────────────────────────────────────────────────────────────
    #  URLs de la aplicación bajo prueba
    #  Usando variables de entorno para mayor flexibilidad.
    #  Si no se define la variable, usa el valor por defecto.
    # ─────────────────────────────────────────────────────────────

    # URL base de DemoBlaze (puede sobreescribirse por línea de comandos)
    # Ejemplo: mvn verify -Dserenity.base.url=https://otro-ambiente.com
    base.url = "https://www.demoblaze.com"

    # ─────────────────────────────────────────────────────────────
    #  Configuración del Reporte HTML de Serenity
    # ─────────────────────────────────────────────────────────────

    # Nombre que aparecerá como título del reporte
    project.name = "DemoBlaze E2E Automation - Serenity BDD"

    # Nombre del equipo responsable de las pruebas
    project.team = "QA Automation Team"

    # Descripción del proyecto en el reporte
    project.description = "Automatización del flujo de compra de DemoBlaze usando Screenplay"

    # ─────────────────────────────────────────────────────────────
    #  Comportamiento ante fallos
    # ─────────────────────────────────────────────────────────────

    # true = continúa ejecutando todos los tests aunque alguno falle
    # false = para al primer fallo (útil para debug)
    browser.restart_after_scenario = true
}

# ─────────────────────────────────────────────────────────────────────
#  SECCIÓN: environments
#  Permite definir diferentes configuraciones por ambiente.
#  Para activar: mvn verify -Denvironment=staging
# ─────────────────────────────────────────────────────────────────────
environments {
    default {
        base.url = "https://www.demoblaze.com"
    }
    dev {
        base.url = "https://www.demoblaze.com"
    }
    staging {
        base.url = "https://www.demoblaze.com"
    }
    # En un proyecto real tendrías URLs diferentes por ambiente:
    # uat { base.url = "https://uat.miempresa.com" }
    # prod { base.url = "https://www.miempresa.com" }
}
